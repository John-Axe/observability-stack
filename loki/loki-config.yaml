auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Single-binary deployment defaults are tuned for a shared multi-tenant
# cluster, not a local dashboard with a handful of panels all querying at
# once on every refresh. Raise both limits so a normal dashboard load/refresh
# never gets rejected with "too many outstanding requests".
frontend:
  max_outstanding_per_tenant: 4096

querier:
  max_concurrent: 16

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093
